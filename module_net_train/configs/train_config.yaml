# =========================
# module_net_train: TRAIN CONFIG (v1)
# =========================

paths:
  # Запускаем скрипты из module_net_train/, поэтому ".." — это корень проекта
  prep_data_root: ../prep_data
  prep_work_root: ../output_data/module_prep_data_work
  # Preferred strict manifest from module_prep_data MVP refactor.
  aoi_manifest: ../output_data/module_prep_data_work/aoi_manifest.json
  runs_root: ../output_data/module_net_train/runs

dataset:
  # Пока считаем всё как "один большой датасет" из prep_data/*
  mode: single  # single | multi (multi оставлено на будущее)

  splits:
    train: train
    val: validation
    test: test

  inputs:
    num_bands: 8
    nodata_value: 65536
    # NEW: valid-mask как 9-й канал
    add_valid_channel: true

    # NEW: NoData policy для вычисления valid (если понадобится)
    nodata_rule: control-band        # control-band | all-bands
    control_band_1based: 1

  targets:
    extent:
      ignore_value: 255     # extent_ig: 0/1/255
    boundary_bwbl:
      skeleton_value: 1     # bwbl: 0 фон, 1 skeleton, 2 buffer(ignore)
      ignore_value: 2

normalization:
  # Для разных сезонов обычно лучше robust-скейлинг по percentiles
  type: robust_percentile      # robust_percentile | mean_std
  p_low: 2
  p_high: 98
  per_band: true
  stats_split: train
  ignore_nodata: true

augmentations:
  enabled: true
  # На старте — только геометрия (без изменения спектра)
  hflip: true
  vflip: true
  rotate90: true
  invalid_edge_sim:
    # Winner default (robust_b-style): synthetic invalid-edge оставляем как опцию,
    # но по умолчанию выключаем из-за худшего practical tradeoff у valid/NoData границ.
    enabled: false
    prob: 0.12
    min_width_px: 12
    max_width_px: 64
    block_prob: 0.35
    max_area_ratio: 0.18
    zero_image: true
  # Если позже понадобится:
  # brightness_contrast: 0.0

sampling:
  # Из файлов img_* (обычно 512) берём random crop под GPU
  crop_size: 256
  crop_policy:
    # Несколько попыток повышают шанс взять crop с boundary-positive пикселями.
    attempts: 8
    min_extent_pixels: 32
    min_boundary_pixels: 24
    # Если квоты не выполнены, чаще берём best-effort crop, но оставляем долю случайных.
    fallback_to_best_prob: 0.80
    near_invalid:
      # Winner default (robust_b-style): мягкий near-invalid crop bias включён.
      enabled: true
      enforce_prob: 0.30
      min_pixels: 64
      radius_px: 2
      # Диагностический радиус в train-логах (near_invalid_ratio).
      diag_radius_px: 2

model:
  name: unet_multitask
  in_channels: 9
  out_heads:
    extent: 1
    boundary: 1
  # Более ёмкая модель для стабильнее/чётче контуров
  base_channels: 24
  depth: 4
  # Для фактического micro-batch=1 обычно устойчивее, чем batchnorm.
  norm: instancenorm
  dropout: 0.0

loss:
  weights:
    extent: 1.0
    boundary: 8.0

  extent:
    bce_weight: 1.0
    dice_weight: 1.0
    ignore_value: 255

  boundary_bwbl:
    # BCE по skeleton (1), buffer (2) игнорируется
    ignore_value: 2
    # Для редких skeleton-positive пикселей.
    pos_weight: auto
    # Умеренный focal помогает против доминирования фона.
    focal_gamma: 1.0
    bce_weight: 1.0
    # Мягкий dice-терм повышает устойчивость на тонких границах.
    dice_weight: 0.25
    dice_smooth: 1.0

metrics:
  extent:
    threshold: 0.50
    compute_iou: true
    compute_f1: true

  boundary:
    # Расширенный набор порогов для подбора более чёткой границы
    thresholds: [0.70, 0.65, 0.60, 0.55, 0.50, 0.45, 0.40, 0.35, 0.30, 0.25, 0.20, 0.15]
    dilation_px: 1
    compute_f1: true

train:
  seed: 203
  deterministic: false

  epochs: 20
  # Можно переключить на iters, если хочешь строгий контроль:
  # max_steps: null

  optimizer:
    name: adamw
    lr: 0.0007
    weight_decay: 0.0001

  scheduler:
    name: cosine
    warmup_epochs: 2
    min_lr: 0.000005

  grad_clip_norm: 1.0

  batch:
    autotune: true
    # Если autotune выключишь — эти значения будут использованы напрямую:
    batch_size: 4
    grad_accum_steps: 1

  log_every_n_steps: 20
  val_every_epochs: 1

  checkpoint:
    save_last: true
    save_best: true
    # Robust to threshold drift across runs.
    monitor: val/boundary_f1_max
    mode: max

inference:
  # Генерация extent_prob.tif и boundary_prob.tif по AOI-растру
  enabled: true

  aoi:
    # Сейчас работаем с first_raster (ключ должен совпадать с manifest'ом из module_prep_data)
    dataset_key: first_raster
    aoi_manifest: ../output_data/module_prep_data_work/aoi_manifest.json

  tiling:
    # Безопасные размеры под 4GB, без швов за счёт overlap
    window_size: 512
    stride: 384
    # Если нужно — можно сделать меньше (window 384 / stride 256)
    batch_size: auto

    # Принятый inference baseline (anti-seam): gaussian center-weighted blending.
    blend: gaussian   # mean | gaussian
    gaussian_sigma: 0.30
    gaussian_min_weight: 0.05

    # Опциональный guardrail: мягко ослабляет шумовые ответы рядом с invalid-границей.
    # По умолчанию выключен для максимально безопасной совместимости.
    invalid_edge_guard:
      enabled: false
      radius_px: 2
      extent_scale: 0.90
      boundary_scale: 0.75

  outputs:
    extent_prob_name: extent_prob.tif
    boundary_prob_name: boundary_prob.tif
    dtype: float32
    compress: deflate
    tiled: true
    bigtiff: if_needed

multi_dataset:
  # Заготовка на будущее (сейчас dataset.mode=single)
  datasets: [first_raster, second_raster]
  sampling_weights:
    first_raster: 1.0
    second_raster: 1.0
