# =========================
# module_net_train: HARDWARE CONFIG (v1)
# =========================

device:
  mode: auto          # auto | cuda | cpu
  prefer_cuda: true

precision:
  mode: auto          # auto | fp32 | fp16 | bf16
  prefer_bf16: true
  allow_tf32: true    # ускоряет matmul на Ampere (если доступно)

gpu:
  max_mem_frac: 0.90
  cudnn_benchmark: true
  channels_last: true
  torch_compile: false   # включим позже, когда всё стабильно

autotune:
  enabled: true

  # Подбираем максимально возможный crop и batch (в рамках списка)
  crop_sizes: [512, 384, 256]
  batch_sizes: [8, 4, 2, 1]
  grad_accum_steps: [1, 2, 4, 8]

  # Короткий тест (несколько forward/backward) чтобы поймать OOM и выбрать настройки
  test_steps: 2

dataloader:
  num_workers: auto
  max_num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

runtime:
  # Если вдруг понадобится ограничить CPU-параллелизм
  # cpu_threads: 0   # 0 = не трогаем
  warn_if_cpu: true