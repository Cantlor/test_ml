# Base config for module_postprocess_vectorize

# Input naming (used by batch search/run scanners)
extent_prob_name: extent_prob.tif
boundary_prob_name: boundary_prob.tif
valid_mask_name: valid_mask.tif
predict_manifest_name: predict_manifest.json

# Core post-processing thresholds
extent_thr: 0.50
boundary_thr: 0.45
gaussian_sigma_px: 1.0
boundary_dilate_px: 1

# Area thresholds (m^2)
min_area_m2: 120.0
fill_holes_max_area_m2: 80.0
small_region_max_area_m2: 60.0
remove_small_objects_m2: 60.0

# Morphology (pixels)
opening_px: 0
closing_px: 0

# Instance separation
seed_min_distance_px: 6
seed_hmax: 1.0
marker_erode_px: 1
use_watershed: true
boundary_weight: 2.5
sobel_weight: 0.2

# Memory safety guard-rails for large AOI rasters.
memory:
  # Input probability dtype at load time.
  prob_dtype: float16
  # auto -> float32 on safe scenes, float16 under RAM pressure.
  smooth_dtype: auto
  smooth_dtype_large: float16
  # Conservative RAM-aware planner for portable behavior across machines.
  ram_budget_fraction: 0.30
  ram_guard_mb: 1024
  min_ram_budget_mb: 768
  degrade_gaussian_pressure: 0.70
  disable_gaussian_pressure: 1.15
  disable_watershed_pressure: 0.95
  switch_fast_clean_pressure: 0.85
  auto_disable_watershed: true
  force_no_watershed: false
  max_pixels_for_watershed: 50000000
  warn_pixels_threshold: 30000000
  auto_disable_gaussian_large: true
  max_pixels_for_gaussian: 50000000
  sobel_weight_large: 0.0
  clean_labels_mode: auto
  clean_labels_fast_pixels_threshold: 40000000
  clean_labels_max_exact_hole_labels: 512
  clean_labels_max_exact_merge_regions: 2048

# Final geometry cleanup
remove_holes: true
simplify_m: 0.8
clip_to_valid: true

straighten:
  enabled: false
  snap_angle_deg: 15.0

# Export controls
save_intermediates: true
export_shp: false

# Evaluation/scoring
scoring:
  metric_name: object_f1_iou50
  iou_threshold: 0.5

# Search space for scripts/01_search_postprocess_params.py
search:
  strategy:
    # coarse_to_fine avoids brute-force explosion on large grids.
    mode: coarse_to_fine   # coarse_to_fine | grid
    max_trials_auto: 256
    coarse_trials: 96
    coarse_top_k: 3
    refine_neighbor_span: 1
  grid:
    extent_thr: [0.45, 0.50, 0.55]
    boundary_thr: [0.35, 0.45, 0.55]
    boundary_dilate_px: [0, 1, 2]
    gaussian_sigma_px: [0.6, 1.0, 1.4]
    min_area_m2: [80.0, 120.0, 180.0]
    simplify_m: [0.4, 0.8, 1.2]
    marker_erode_px: [0, 1, 2]
    seed_min_distance_px: [4, 6, 8]
